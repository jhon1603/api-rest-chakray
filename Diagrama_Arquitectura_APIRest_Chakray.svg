
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #4b5563; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 16; ry: 16; }
      .layer { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 18; ry: 18; }
      .config { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; rx: 18; ry: 18; }
      .util { fill: #fffbeb; stroke: #b45309; stroke-width: 2; rx: 18; ry: 18; }
      .storage { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 18; ry: 18; }
      .text { font: 700 20px Arial, sans-serif; fill: #111827; }
      .small { font: 400 15px Arial, sans-serif; fill: #374151; }
      .tiny { font: 400 14px Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow2 { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); stroke-dasharray: 8 6; }
      .label { font: 700 14px Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <text x="700" y="48" text-anchor="middle" class="title">Diagrama de Arquitectura - API REST Chakray</text>
  <text x="700" y="76" text-anchor="middle" class="subtitle">Spring Boot 4 · Java 17 · Maven · Lombok · Swagger/OpenAPI · Repository In-Memory</text>

  <!-- Client -->
  <rect x="525" y="110" width="350" height="90" class="box"/>
  <text x="700" y="145" text-anchor="middle" class="text">Cliente / Consumidor API</text>
  <text x="700" y="172" text-anchor="middle" class="small">Swagger UI · Postman · Navegador · Frontend</text>

  <!-- Controller -->
  <rect x="450" y="255" width="500" height="110" class="layer"/>
  <text x="700" y="292" text-anchor="middle" class="text">Controller Layer</text>
  <text x="700" y="320" text-anchor="middle" class="small">UserController · AuthController</text>
  <text x="700" y="344" text-anchor="middle" class="tiny">Expone endpoints REST: GET /users, POST /users, PATCH /users/{id}, DELETE /users/{id}, POST /login</text>

  <!-- Service -->
  <rect x="450" y="425" width="500" height="120" class="layer"/>
  <text x="700" y="462" text-anchor="middle" class="text">Service Layer</text>
  <text x="700" y="490" text-anchor="middle" class="small">UserService</text>
  <text x="700" y="514" text-anchor="middle" class="tiny">Lógica de negocio · validaciones · filtros · ordenamiento · login · cifrado AES256</text>

  <!-- Repository -->
  <rect x="450" y="610" width="500" height="110" class="storage"/>
  <text x="700" y="647" text-anchor="middle" class="text">Repository Layer</text>
  <text x="700" y="675" text-anchor="middle" class="small">UserRepository · InMemoryUserRepository</text>
  <text x="700" y="699" text-anchor="middle" class="tiny">Persistencia temporal en memoria mediante List&lt;UserDto&gt;</text>

  <!-- Data -->
  <rect x="450" y="790" width="500" height="105" class="storage"/>
  <text x="700" y="827" text-anchor="middle" class="text">Datos en Memoria</text>
  <text x="700" y="855" text-anchor="middle" class="small">3 usuarios iniciales precargados · UUID · addresses · createdAt · taxId</text>

  <!-- Left side support -->
  <rect x="70" y="270" width="280" height="130" class="box"/>
  <text x="210" y="305" text-anchor="middle" class="text">Request / Response</text>
  <text x="210" y="332" text-anchor="middle" class="small">CreateUserRequest · UpdateUserRequest</text>
  <text x="210" y="356" text-anchor="middle" class="small">LoginRequest · UserResponse · LoginResponse</text>

  <rect x="70" y="455" width="280" height="115" class="box"/>
  <text x="210" y="490" text-anchor="middle" class="text">DTO / Model</text>
  <text x="210" y="518" text-anchor="middle" class="small">UserDto · Address</text>
  <text x="210" y="542" text-anchor="middle" class="small">Intercambio interno de datos</text>

  <!-- Right side support -->
  <rect x="1050" y="250" width="280" height="145" class="config"/>
  <text x="1190" y="285" text-anchor="middle" class="text">Config</text>
  <text x="1190" y="313" text-anchor="middle" class="small">OpenApiConfig</text>
  <text x="1190" y="337" text-anchor="middle" class="small">DataLoaderConfig</text>
  <text x="1190" y="361" text-anchor="middle" class="tiny">Swagger/OpenAPI · carga inicial de usuarios</text>

  <rect x="1050" y="445" width="280" height="165" class="util"/>
  <text x="1190" y="480" text-anchor="middle" class="text">Util</text>
  <text x="1190" y="508" text-anchor="middle" class="small">AesUtil · DateUtil · UserMapper</text>
  <text x="1190" y="532" text-anchor="middle" class="small">RfcValidator · PhoneValidator</text>
  <text x="1190" y="556" text-anchor="middle" class="tiny">Cifrado, mapeo, validaciones y fecha en zona Madagascar</text>

  <rect x="1050" y="665" width="280" height="125" class="box"/>
  <text x="1190" y="700" text-anchor="middle" class="text">Exception</text>
  <text x="1190" y="728" text-anchor="middle" class="small">GlobalExceptionHandler</text>
  <text x="1190" y="752" text-anchor="middle" class="small">BadRequest · Unauthorized · NotFound</text>

  <!-- Arrows vertical -->
  <line x1="700" y1="200" x2="700" y2="255" class="arrow"/>
  <line x1="700" y1="365" x2="700" y2="425" class="arrow"/>
  <line x1="700" y1="545" x2="700" y2="610" class="arrow"/>
  <line x1="700" y1="720" x2="700" y2="790" class="arrow"/>

  <!-- Side arrows -->
  <line x1="350" y1="335" x2="450" y2="310" class="arrow2"/>
  <text x="390" y="312" class="label">JSON</text>

  <line x1="350" y1="515" x2="450" y2="485" class="arrow2"/>
  <text x="385" y="482" class="label">Mapeo</text>

  <line x1="950" y1="310" x2="1050" y2="310" class="arrow2"/>
  <text x="975" y="295" class="label">Bootstrapping</text>

  <line x1="950" y1="490" x2="1050" y2="490" class="arrow2"/>
  <text x="985" y="475" class="label">Validación</text>

  <line x1="950" y1="675" x2="1050" y2="725" class="arrow2"/>
  <text x="972" y="705" class="label">Errores</text>

  <!-- Footer -->
  <text x="700" y="945" text-anchor="middle" class="subtitle">Flujo principal: Cliente → Controller → Service → Repository → Datos en Memoria</text>
</svg>
